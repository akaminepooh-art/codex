<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>もぐらたたき | Codex Sample</title>
  <meta
    name="description"
    content="ブラウザですぐ遊べる、シンプルなもぐらたたきゲームです。"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">Simple Browser Game</p>
      <h1>もぐらたたき</h1>
      <p class="lead">
        30秒でどれだけスコアを伸ばせるか挑戦しましょう。金のもぐらは高得点、いたずら爆弾は減点です。
      </p>
    </section>

    <section class="status-panel" aria-label="ゲームの状態">
      <div class="status-card">
        <span class="label">SCORE</span>
        <strong id="score">0</strong>
      </div>
      <div class="status-card">
        <span class="label">TIME</span>
        <strong id="time">30</strong>
      </div>
      <div class="status-card">
        <span class="label">BEST</span>
        <strong id="best-score">0</strong>
      </div>
    </section>

    <section class="controls">
      <button id="start-button" class="primary-button" type="button">スタート</button>
      <button id="restart-button" class="secondary-button" type="button">リスタート</button>
    </section>

    <p id="message" class="message" aria-live="polite">
      スタートを押すとゲーム開始です。
    </p>

    <section class="board-shell">
      <div class="board" id="board" aria-label="もぐらたたきの盤面">
        <button class="hole" type="button" aria-label="穴 1" data-index="0">
          <span class="burrow"></span>
          <span class="mole" data-kind="normal"></span>
        </button>
        <button class="hole" type="button" aria-label="穴 2" data-index="1">
          <span class="burrow"></span>
          <span class="mole" data-kind="normal"></span>
        </button>
        <button class="hole" type="button" aria-label="穴 3" data-index="2">
          <span class="burrow"></span>
          <span class="mole" data-kind="normal"></span>
        </button>
        <button class="hole" type="button" aria-label="穴 4" data-index="3">
          <span class="burrow"></span>
          <span class="mole" data-kind="normal"></span>
        </button>
        <button class="hole" type="button" aria-label="穴 5" data-index="4">
          <span class="burrow"></span>
          <span class="mole" data-kind="normal"></span>
        </button>
        <button class="hole" type="button" aria-label="穴 6" data-index="5">
          <span class="burrow"></span>
          <span class="mole" data-kind="normal"></span>
        </button>
        <button class="hole" type="button" aria-label="穴 7" data-index="6">
          <span class="burrow"></span>
          <span class="mole" data-kind="normal"></span>
        </button>
        <button class="hole" type="button" aria-label="穴 8" data-index="7">
          <span class="burrow"></span>
          <span class="mole" data-kind="normal"></span>
        </button>
        <button class="hole" type="button" aria-label="穴 9" data-index="8">
          <span class="burrow"></span>
          <span class="mole" data-kind="normal"></span>
        </button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
